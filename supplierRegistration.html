<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="supply.css" />
    <!-- this is my updated file -->
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div>
          <a href="dashboard.html">Dashboard</a>
        </div>
        <div>
          <a href="sales management.html">Sales Management</a>
        </div>
        <div>
          <a href="transport management.html">Transport Management</a>
        </div>
      </div>
      <div class="content">
        <form action="" method="get">
          <!-- Supplies section -->
          <h1>Supplies Registration</h1>
          <section>
            <div>
              <label for="suppliername">Supplier Name</label>
              <input
                type="text"
                id="suppliername"
                placeholder="enter full name"
              />
            </div>
            <div>
              <label for="company name">Company Name</label>
              <input type="text" id="company name" placeholder="" />
            </div>
          </section>
          <section>
            <div>
              <label for="tin">Tax Identification Number (TIN)</label>
              <input type="text" id="tin" placeholder="enter TIN No" />
            </div>
            <div>
              <label for="type of business">Type of Business</label>
              <input type="text" id="business type" placeholder="" />
            </div>
          </section>
          <!-- Customer Information -->
          <h2>Customer Information</h2>
          <section>
            <div>
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="eg Faith Jeon" />
            </div>
            <div>
              <label for="contact">Contact</label>
              <input type="tel" id="contact" placeholder="" />
            </div>
          </section>
          <section>
            <div>
              <label for="email">Email</label>
              <input type="email" id="email" />
            </div>
            <div>
              <label for="other phonenumber">Alternative Contact</label>
              <input type="text" id="other phonenumber" />
            </div>
          </section>
          <!-- Address Information -->
          <h2>Address Information</h2>
          <section>
            <div>
              <label for="country">Country</label>
              <select name="choose country" id="">
                <option value="1">Uganda</option>
                <option value="2">Kenya</option>
                <option value="3">Tanzania</option>
                <option value="4">Rwanda</option>
                <option value="5">Burundi</option>
              </select>
            </div>
            <div>
              <label for="address">Address</label>
              <input type="text" id="address" />
            </div>
          </section>
          <section>
            <div>
              <label for="zipcode">Postal Zipcode</label>
              <input type="text" id="zipcode" />
            </div>
            <div>
              <label for="street address">Street Address</label>
              <input type="text" id="address" />
            </div>
          </section>
          <!-- Product/supply info -->
          <h2>Product/Supply Information</h2>
          <section>
            <div>
              <label for="category">Product Category</label>
              <input
                type="text"
                id="category"
                placeholder="enter stock category"
              />
            </div>
            <div>
              <label for="supply capacity">Supply Capacity</label>
              <input type="text" id="supply capacity" />
            </div>
          </section>
          <section>
            <div>
              <label for="pdt description">Product Description</label>
              <input type="text" id="pdt description" />
            </div>
            <div>
              <label for="delivery method">Delivery Method</label>
              <select name="choose method" id="">
                <option value="1">Shipping Cargo</option>
                <option value="2">Air Cargo</option>
                <option value="3">Truck Cargo</option>
              </select>
            </div>
          </section>
          <br />
          <!-- buttons -->
          <section id="btn-section">
            <button type="reset">Cancel</button>
            <button type="submit">Submit</button>
          </section>
        </form>
      </div>
    </div>
  </body>
</html>
